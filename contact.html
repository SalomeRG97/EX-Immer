<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Ex-Immer</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-family: var(--font-main);
            font-size: 1rem;
            margin-bottom: 24px;
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">Ex-Immer</a>
            <div class="nav-links hidden-mobile">
                <a href="services.html" class="nav-link">Services</a>
                <a href="use-cases.html" class="nav-link">Use Cases</a>
                <a href="pricing.html" class="nav-link">Pricing</a>
                <a href="demo.html" class="nav-link btn btn-primary"
                    style="padding: 8px 16px; font-size: 0.85rem;">Request Demo</a>
            </div>
        </div>
    </nav>

    <main>

        <section class="section" style="padding-top: 160px; padding-bottom: 40px;">
            <div class="container text-center">
                <h1 class="mb-md">Let's talk about your project</h1>
                <p style="max-width: 600px; margin: 0 auto; font-size: 1.25rem;">
                    Have a question or looking for a custom solution? We're here to help.
                </p>
            </div>
        </section>

        <section class="section" style="padding-top: 0;">
            <div class="container" style="max-width: 600px;">
                <div class="card">
                    <form action="#" method="POST">
                        <label class="form-label" for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-input" required>

                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-input" required>

                        <label class="form-label" for="company">Company</label>
                        <input type="text" id="company" name="company" class="form-input">

                        <label class="form-label" for="project-type">Project Type</label>
                        <select id="project-type" name="project-type" class="form-input">
                            <option value="residential">Residential Development</option>
                            <option value="commercial">Commercial / Office</option>
                            <option value="brokerage">Brokerage / Agency</option>
                            <option value="other">Other</option>
                        </select>

                        <label class="form-label" for="message">Message</label>
                        <textarea id="message" name="message" class="form-textarea" required></textarea>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
                    </form>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer">
        <div class="container">
            <p style="color: var(--color-text-secondary);">&copy; 2026 Ex-Immer.</p>
        </div>
    </footer>

</body>

</html>
